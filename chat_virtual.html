<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiMind — 4 LLMs, 1 Prompt</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --app-bg: #1a1a1a;
  --app-border: #2e2e2e;
  --app-text: #e0e0e0;
  --app-muted: #888;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--app-bg);
  color: var(--app-text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100vh;
}

/* ── TOP BAR ─────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: #111;
  border-bottom: 1px solid #2a2a2a;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.topbar-title {
  font-size: 13px;
  font-weight: 700;
  color: #ccc;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.toggles { display: flex; gap: 5px; }

.tog {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid #333;
  background: transparent;
  color: #555;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
  font-weight: 500;
}
.tog.on { color: #fff; }
.tog[data-m="claude"].on  { background:#c96442; border-color:#c96442; }
.tog[data-m="gpt"].on    { background:#19c37d; border-color:#19c37d;}
.tog[data-m="gemini"].on { background:#CF9FFF; border-color:#CF9FFF; }
.tog[data-m="deepseek"].on{ background:#00A0D1; border-color:#00A0D1; }

.topbar-spacer { flex: 1; }

.clear-btn {
  font-size: 11px; padding: 4px 10px;
  background: transparent; border: 1px solid #333;
  border-radius: 6px; color: #666; cursor: pointer;
  transition: all .15s;
}
.clear-btn:hover { color: #ccc; border-color: #555; }

.cfg-btn {
  font-size: 12px; padding: 5px 12px;
  background: #222; border: 1px solid #383838;
  border-radius: 6px; color: #aaa; cursor: pointer;
  transition: all .15s;
}
.cfg-btn:hover { background: #2a2a2a; color: #ddd; }

/* ── GRID ────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

@media (max-width: 1100px) { .grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 620px)  { .grid { grid-template-columns: 1fr; } }

.panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid #2a2a2a;
  min-height: 0;
}
.panel:last-child { border-right: none; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CLAUDE — warm cream, Söhne-inspired
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.panel-claude {
  background: #f5f0eb;
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  color: #1a1a1a;
}

.ph-claude {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px;
  background: #ede8e3;
  border-bottom: 1px solid #d8d0c8;
  font-size: 13px; font-weight: 500; color: #3d3d3d;
  flex-shrink: 0;
}
.logo-claude {
  width: 24px; height: 24px; border-radius: 5px;
  background: #c96442;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 12px; font-weight: 700;
}

.msgs-claude {
  flex: 1; overflow-y: auto;
  padding: 16px; display: flex; flex-direction: column; gap: 14px;
  scroll-behavior: smooth;
}
.msgs-claude::-webkit-scrollbar { width: 4px; }
.msgs-claude::-webkit-scrollbar-thumb { background: #d0c8bf; border-radius: 4px; }

.cu { display: flex; justify-content: flex-end; }
.cu .b {
  background: #e8e0d8; color: #1a1a1a;
  border-radius: 18px 18px 4px 18px;
  padding: 9px 13px; font-size: 14px; line-height: 1.55;
  max-width: 86%; white-space: pre-wrap; word-break: break-word;
}
.ca { display: flex; gap: 9px; align-items: flex-start; }
.ca .av {
  width: 28px; height: 28px; flex-shrink: 0;
  background: #c96442; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 12px; font-weight: 600;
}
.ca .b {
  background: transparent; color: #1a1a1a;
  font-size: 14px; line-height: 1.65; max-width: 90%;
  white-space: pre-wrap; word-break: break-word; padding-top: 3px;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CHATGPT — dark #212121
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.panel-gpt {
  background: #212121;
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  color: #ececec;
}

.ph-gpt {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px;
  background: #212121;
  border-bottom: 1px solid #2d2d2d;
  font-size: 13px; color: #aaa; flex-shrink: 0;
}
.logo-gpt {
  width: 24px; height: 24px; border-radius: 50%;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
}
.logo-gpt svg { width: 14px; height: 14px; }

.msgs-gpt {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column;
  scroll-behavior: smooth;
}
.msgs-gpt::-webkit-scrollbar { width: 4px; }
.msgs-gpt::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }

.gu { display: flex; justify-content: flex-end; padding: 10px 14px 4px; }
.gu .b {
  background: #2f2f2f; color: #ececec;
  border-radius: 18px 18px 4px 18px;
  padding: 9px 13px; font-size: 14px; line-height: 1.55;
  max-width: 86%; white-space: pre-wrap; word-break: break-word;
}
.ga { padding: 10px 14px; display: flex; gap: 10px; align-items: flex-start; }
.ga .av {
  width: 28px; height: 28px; flex-shrink: 0;
  background: #19c37d; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #000; font-size: 11px; font-weight: 700;
}
.ga .b {
  color: #ececec; font-size: 14px; line-height: 1.65;
  white-space: pre-wrap; word-break: break-word; flex: 1; padding-top: 2px;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   GEMINI — dark #1c1c1e, Google Sans
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.panel-gemini {
  background: #1c1c1e;
  font-family: 'Google Sans', 'Roboto', sans-serif;
  color: #e3e3e3;
}

.ph-gemini {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px;
  background: #1c1c1e;
  border-bottom: 1px solid #2c2c2e;
  font-size: 13px; color: #9aa0a6; flex-shrink: 0;
}

.msgs-gemini {
  flex: 1; overflow-y: auto;
  padding: 16px; display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}
.msgs-gemini::-webkit-scrollbar { width: 4px; }
.msgs-gemini::-webkit-scrollbar-thumb { background: #3a3a3e; border-radius: 4px; }

.gemu { display: flex; justify-content: flex-end; }
.gemu .b {
  background: #2c2c2e; color: #e3e3e3;
  border-radius: 20px 20px 4px 20px;
  padding: 9px 14px; font-size: 14px; line-height: 1.55;
  max-width: 86%; white-space: pre-wrap; word-break: break-word;
}
.gema { display: flex; gap: 9px; align-items: flex-start; }
.gema .av {
  width: 28px; height: 28px; flex-shrink: 0;
  background: linear-gradient(135deg,#4285f4,#9b72cb,#d96570);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}
.gema .b {
  color: #e3e3e3; font-size: 14px; line-height: 1.65;
  white-space: pre-wrap; word-break: break-word; flex: 1; padding-top: 3px;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MISTRAL — near-black, Inter
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.panel-mistral {
  background: #0e0e0e;
  font-family: 'Inter', ui-sans-serif, sans-serif;
  color: #e2e2e2;
}

.ph-mistral {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px;
  background: #111;
  border-bottom: 1px solid #1e1e1e;
  font-size: 13px; color: #999; flex-shrink: 0;
}

.msgs-mistral {
  flex: 1; overflow-y: auto;
  padding: 16px; display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}
.msgs-mistral::-webkit-scrollbar { width: 4px; }
.msgs-mistral::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

.mu { display: flex; justify-content: flex-end; }
.mu .b {
  background: #1e1e1e; color: #e2e2e2;
  border: 1px solid #2a2a2a;
  border-radius: 16px 16px 4px 16px;
  padding: 9px 13px; font-size: 14px; line-height: 1.55;
  max-width: 86%; white-space: pre-wrap; word-break: break-word;
}
.ma { display: flex; gap: 9px; align-items: flex-start; }
.ma .av {
  width: 28px; height: 28px; flex-shrink: 0;
  background: #566ab1; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}
.ma .b {
  color: #e2e2e2; font-size: 14px; line-height: 1.65;
  white-space: pre-wrap; word-break: break-word; flex: 1; padding-top: 3px;
}

/* ── STATUS PILL ─────────────────────────── */
.sp {
  font-size: 10px; padding: 2px 8px;
  border-radius: 10px; margin-left: auto; font-weight: 500;
  flex-shrink: 0;
}
.sp-idle    { background: #2a2a2a; color: #666; }
.sp-loading { background: #2a3a2a; color: #4caf50; animation: blink 1s infinite; }
.sp-done    { background: #1a3a1a; color: #4caf50; }
.sp-err     { background: #3a1a1a; color: #e05555; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.45} }

/* ── TYPING DOTS ─────────────────────────── */
.td { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
.td span {
  width: 6px; height: 6px; border-radius: 50%;
  animation: tda 1.2s infinite;
}
.td span:nth-child(2){animation-delay:.2s} .td span:nth-child(3){animation-delay:.4s}
@keyframes tda { 0%,80%,100%{opacity:.2;transform:scale(1)} 40%{opacity:1;transform:scale(1.2)} }
.panel-claude .td span { background:#c96442; }
.panel-gpt    .td span { background:#19c37d; }
.panel-gemini .td span { background:#4a90d9; }
.panel-mistral .td span { background:#fa520f; }

/* ── EMPTY STATE ─────────────────────────── */
.empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; text-align: center; padding: 24px;
  opacity: .4;
}
.ei { font-size: 30px; }
.el { font-size: 13px; }
.panel-claude .el { color:#5a4a3a; }
.panel-gpt    .el { color:#888; }
.panel-gemini .el { color:#9aa0a6; font-family:'Google Sans',sans-serif; }
.panel-mistral .el { color:#555; }

/* ── BOTTOM BAR ──────────────────────────── */
.bottom {
  background: #111;
  border-top: 1px solid #2a2a2a;
  padding: 10px 14px;
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
}

.pw {
  flex: 1; background: #1e1e1e;
  border: 1px solid #333; border-radius: 12px;
  display: flex; align-items: flex-end;
  padding: 7px 10px; gap: 8px;
  transition: border-color .2s;
}
.pw:focus-within { border-color: #555; }

textarea#prompt {
  flex: 1; background: transparent; border: none; outline: none;
  color: #e0e0e0; font-family: inherit; font-size: 14px;
  line-height: 1.5; resize: none;
  min-height: 22px; max-height: 130px;
}
textarea#prompt::placeholder { color: #444; }

.sbtn {
  background: #e0e0e0; border: none; border-radius: 7px;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: opacity .15s, transform .1s;
}
.sbtn:hover { opacity: .85; }
.sbtn:active { transform: scale(.95); }
.sbtn:disabled { opacity: .3; cursor: not-allowed; }
.sbtn svg { width: 15px; height: 15px; }

/* ── CONFIG MODAL ────────────────────────── */
.ov {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.78); z-index: 999;
  align-items: center; justify-content: center;
}
.ov.open { display: flex; }

.modal {
  background: #1a1a1a; border: 1px solid #333;
  border-radius: 14px; padding: 22px;
  width: 450px; max-width: 94vw;
}
.modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #e0e0e0; }
.mf { margin-bottom: 12px; }
.mf label {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: #666; margin-bottom: 5px;
  text-transform: uppercase; letter-spacing: .07em;
}
.mf label .d { width: 6px; height: 6px; border-radius: 50%; }
.mf input {
  width: 100%; background: #0e0e0e;
  border: 1px solid #2e2e2e; border-radius: 7px;
  color: #e0e0e0; font-family: monospace; font-size: 12px;
  padding: 7px 11px; outline: none; transition: border-color .2s;
}
.mf input:focus { border-color: #4a4a4a; }
.mf input::placeholder { color: #333; }

.mn {
  font-size: 11px; color: #555; line-height: 1.5;
  background: #111; border-radius: 7px;
  padding: 9px; border: 1px solid #222; margin-top: 4px;
}
.ma2 { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.bcancel {
  background: transparent; border: 1px solid #333;
  border-radius: 7px; color: #777; font-size: 13px;
  padding: 7px 15px; cursor: pointer; transition: all .15s;
}
.bcancel:hover { color: #ccc; border-color: #555; }
.bsave {
  background: #e0e0e0; border: none; border-radius: 7px;
  color: #111; font-size: 13px; font-weight: 600;
  padding: 7px 18px; cursor: pointer; transition: opacity .15s;
}
.bsave:hover { opacity: .85; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">MultiPrompt</span>
  <div class="toggles">
    <div class="tog on" data-m="claude" onclick="tog('claude')">Claude</div>
    <div class="tog on" data-m="gpt"    onclick="tog('gpt')">ChatGPT</div>
    <div class="tog on" data-m="gemini" onclick="tog('gemini')">Gemini</div>
    <div class="tog on" data-m="deepseek"onclick="tog('mistral')">Deepseek</div>
  </div>
  <div class="topbar-spacer"></div>
  <button class="clear-btn" onclick="clearAll()">Limpar</button>
  
</div>

<div class="grid">

  <!-- CLAUDE -->
  <div class="panel panel-claude">
    <div class="ph-claude">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="#c96442" viewBox="0 0 16 16">

</svg>
      <span>Claude</span>
      <span class="sp sp-idle" id="st-claude">pronto</span>
    </div>
    <div class="msgs-claude" id="msgs-claude">
      <div class="empty">
        <div class="ei">✦</div>
        <div class="el">How can i help you today?</div>
      </div>
    </div>
  </div>

  <!-- GPT -->
  <div class="panel panel-gpt">
    <div class="ph-gpt">
      <div class="logo-gpt">

<!-- BOTTOM PROMPT -->
<div class="bottom">
  <div class="pw">
    <textarea id="prompt" rows="1"
      placeholder="Escreve o teu prompt… (Enter envia · Shift+Enter nova linha)"
      onkeydown="onKey(event)" oninput="resize(this)"></textarea>
    <button class="sbtn" id="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
</div>

<script>
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');

function pill(m,cls,txt){ const e=document.getElementById(`st-${m}`); e.className=`sp ${cls}`; e.textContent=txt; }
function scrollBot(id){ const e=document.getElementById(id); e.scrollTop=e.scrollHeight; }
function clearEmpty(id){ const e=document.getElementById(id).querySelector('.empty'); if(e)e.remove(); }

function addMsg(model,role,html){
  clearEmpty(`msgs-${model}`);
  const c=document.getElementById(`msgs-${model}`);
  const d=document.createElement('div');
  const v={
    claude:{ user:`<div class="cu"><div class="b">${html}</div></div>`, ai:`<div class="ca"><div class="av">C</div><div class="b">${html}</div></div>` },
    gpt:   { user:`<div class="gu"><div class="b">${html}</div></div>`, ai:`<div class="ga"><div class="av">G</div><div class="b">${html}</div></div>` },
    gemini:{ user:`<div class="gemu"><div class="b">${html}</div></div>`, ai:`<div class="gema"><div class="av">G</div><div class="b">${html}</div></div>` },
    mistral:{ user:`<div class="mu"><div class="b">${html}</div></div>`, ai:`<div class="ma"><div class="av">M</div><div class="b">${html}</div></div>` }
  };
  d.innerHTML=v[model][role==='user'?'user':'ai'];
  c.appendChild(d);
  scrollBot(`msgs-${model}`);
}

function addTyping(model){
  clearEmpty(`msgs-${model}`);
  const c=document.getElementById(`msgs-${model}`);
  const d=document.createElement('div'); d.id=`typ-${model}`;
  const dots=`<div class="td"><span></span><span></span><span></span></div>`;
  const avs={claude:'C',gpt:'G',gemini:'G',mistral:'D'};
  const cls={claude:'ca',gpt:'ga',gemini:'gema',mistral:'ma'};
  d.innerHTML=`<div class="${cls[model]}"><div class="av">${avs[model]}</div>${dots}</div>`;
  c.appendChild(d); scrollBot(`msgs-${model}`);
}
function removeTyping(m){ const e=document.getElementById(`typ-${m}`); if(e)e.remove(); }

function tog(m){ const on=document.querySelector(`.tog[data-m="${m}"]`).classList.toggle('on'); }

const emptyNodes={
  claude:`<div class="empty"><div class="ei">✦</div><div class="el">Como posso ajudar?</div></div>`,
  gpt:`<div class="empty"><div class="ei" style="font-size:34px;color:#555">⊕</div><div class="el">How can I help you today?</div></div>`,
  gemini:`<div class="empty"><svg width="38" height="38" viewBox="0 0 28 28" fill="none"><path d="M14 2C14 2 15.5 10 22 14C15.5 18 14 26 14 26C14 26 12.5 18 6 14C12.5 10 14 2 14 2Z" fill="url(#ge3)"/><defs><linearGradient id="ge3" x1="6" y1="2" x2="22" y2="26" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#4285f4"/><stop offset="100%" stop-color="#d96570"/></linearGradient></defs></svg><div class="el">Hello! How can I help?</div></div>`,
  mistral:`<div class="empty"><img src="https://1000logos.net/wp-content/uploads/2025/01/DeepSeek-Emblem.png" width="50" height="30"><div class="el">How can I help you?</div></div>`
};

function clearAll(){
  ['claude','gpt','gemini','mistral'].forEach(m=>{
    pill(m,'sp-idle','pronto');
    document.getElementById(`msgs-${m}`).innerHTML=emptyNodes[m];
  });
}

function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,130)+'px'; }
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }

async function send(){
  const ta=document.getElementById('prompt');
  const p=ta.value.trim();
  if(!p) return;
  ta.value=''; ta.style.height='auto';
  document.getElementById('send-btn').disabled=true;

  // mostrar prompt e typing em todos os paineis
  ['claude','gpt','gemini','mistral'].forEach(m=>{
    addMsg(m,'user',esc(p));
    addTyping(m);
    pill(m,'sp-loading','a pensar…');
  });

  try {
    const r = await fetch('/ask', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt: p})
    });
    const data = await r.json();

    ['claude','gpt','gemini','mistral'].forEach(m=>{
      removeTyping(m);
      addMsg(m,'assistant', esc(data.responses[m] || '(sem resposta)'));
      pill(m,'sp-done','✓');
    });
  } catch(err) {
    ['claude','gpt','gemini','mistral'].forEach(m=>{
      removeTyping(m);
      addMsg(m,'assistant',`⚠ Erro: ${esc(err.message)}`);
      pill(m,'sp-err','erro');
    });
  }

  document.getElementById('send-btn').disabled=false;
}
</script>
</body>
</html>
