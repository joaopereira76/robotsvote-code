
    <!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notícias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --border: rgba(255,255,255,0.07);
      --text: #e0ddd8;
      --muted: #888580;
      --accent: #c8b89a;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    /* ─── Statement ─── */
    .statement {
      max-width: 580px;
      text-align: center;
      margin-bottom: 52px;
    }
    .statement__label {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(200,184,154,0.25);
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 18px;
    }
    .statement__text {
      font-size: 16px;
      font-weight: 300;
      color: var(--text);
      line-height: 1.75;
      letter-spacing: 0.01em;
    }

    /* ─── Grid ─── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 860px;
    }

    .card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.2s;
      border-radius: 10px;
    }
    .card:hover::after { background: rgba(0,0,0,0.18); }

    .card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .card:hover img { transform: scale(1.025); }

    .card__zoom {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      background: rgba(0,0,0,0.55);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 2;
    }
    .card__zoom svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; }
    .card:hover .card__zoom { opacity: 1; }

    /* ─── Lightbox ─── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lb-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(8,8,8,0.92);
      cursor: pointer;
    }

    .lb-content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .lb-img-wrap {
      max-width: 88vw;
      max-height: 85vh;
      transform: scale(0.94);
      transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .lightbox.open .lb-img-wrap { transform: scale(1); }

    .lb-img-wrap img {
      display: block;
      max-width: 88vw;
      max-height: 85vh;
      border-radius: 10px;
      object-fit: contain;
    }

    .lb-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.15s;
      position: relative;
      z-index: 3;
    }
    .lb-btn:hover { background: rgba(255,255,255,0.16); transform: scale(1.07); }
    .lb-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .lb-counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.35);
      z-index: 110;
    }

    .lb-close {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 110;
    }

    /* ─── Keyboard hint ─── */
    .kb-hint {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      display: none;
      z-index: 110;
    }
    .lightbox.open ~ .kb-hint { display: block; }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .lb-btn.lb-prev, .lb-btn.lb-next { display: none; }
    }
  </style>
</head>
<body>

  <div class="statement">
    <span class="statement__label">Statement em discussão</span>
    <p class="statement__text" id="stmt-text">A utilização não regulamentada da robótica pode levar a mudanças sociais.</p>
  </div>

  <div class="grid" id="grid">
    <div class="card" onclick="openLightbox(0)" tabindex="0" role="button" aria-label="Ver imagem 1 em grande">
      <img src="./articles/card_1.png" alt="Artigo 1">
      <span class="card__zoom">
        <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      </span>
    </div>
    <div class="card" onclick="openLightbox(1)" tabindex="0" role="button" aria-label="Ver imagem 2 em grande">
      <img src="./articles/card_2.png" alt="Artigo 2">
      <span class="card__zoom">
        <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      </span>
    </div>
    <div class="card" onclick="openLightbox(2)" tabindex="0" role="button" aria-label="Ver imagem 3 em grande">
      <img src="./articles/card_3.png" alt="Artigo 3">
      <span class="card__zoom">
        <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      </span>
    </div>
    <div class="card" onclick="openLightbox(3)" tabindex="0" role="button" aria-label="Ver imagem 4 em grande">
      <img src="./articles/card_4.png" alt="Artigo 4">
      <span class="card__zoom">
        <svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      </span>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Visualizador de imagem">
    <div class="lb-backdrop" onclick="closeLightbox()"></div>

    <div class="lb-content">
      <button class="lb-btn lb-prev" onclick="navigate(-1)" aria-label="Imagem anterior">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <div class="lb-img-wrap">
        <img id="lb-img" src="" alt="Imagem em destaque">
      </div>

      <button class="lb-btn lb-next" onclick="navigate(1)" aria-label="Próxima imagem">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <button class="lb-btn lb-close" onclick="closeLightbox()" aria-label="Fechar">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>

    <span class="lb-counter" id="lb-counter">1 / 4</span>
  </div>

  <span class="kb-hint">← → navegar &nbsp;·&nbsp; ESC fechar</span>

  <script>
    const images = [
      './articles/card_1.png',
      './articles/card_2.png',
      './articles/card_3.png',
      './articles/card_4.png'
    ];
    let current = 0;

    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    const counter  = document.getElementById('lb-counter');

    function openLightbox(idx) {
      current = idx;
      lbImg.src = images[current];
      counter.textContent = `${current + 1} / ${images.length}`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      current = (current + dir + images.length) % images.length;
      lbImg.style.opacity = '0';
      setTimeout(() => {
        lbImg.src = images[current];
        counter.textContent = `${current + 1} / ${images.length}`;
        lbImg.style.opacity = '1';
      }, 120);
    }

    lbImg.style.transition = 'opacity 0.15s';

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   navigate(-1);
      if (e.key === 'ArrowRight')  navigate(1);
    });

    document.querySelectorAll('.card').forEach((card, idx) => {
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') openLightbox(idx);
      });
    });
  </script>
</body>
</html>
