
    <!DOCTYPE html>
    <html lang="pt">
    <head>
        <meta charset="UTF-8">
        <title>Notícias</title>
    </head>
    <style>
    body {
        margin: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        width: 90vw;
        max-width: 900px;
    }
    img {
        width: 100%;
        height: auto;
        border-radius: 12px;
    }
    .statement{
      font-size:15px;
      font-weight:300;
      color:#d0d0d0;
      text-align:center;
      max-width:600px;
      margin-bottom:48px;
      line-height:1.6;
      letter-spacing:0.01em;
    }
    .statement strong{
      display:block;
      font-size:11px;
      font-family:'IBM Plex Mono',monospace;
      letter-spacing:0.15em;
      text-transform:uppercase;
      color:#bfbfbf;
      margin-bottom:8px;
    }
    </style>
    </head>
    <body>

    <div class="statement">
      <strong>Statement em discussão</strong>
      <span id="stmt-text">Receio que os robôs incentivem uma menor interação entre os seres humanos.</span>
    </div>

    <div class="grid">
        <img src="./articles/card_1.png">
        <img src="./articles/card_2.png">
        <img src="./articles/card_3.png">
        <img src="./articles/card_4.png">
    </div>

    </body>
    </html>
