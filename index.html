
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
}
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 90vw;
    max-width: 900px;
}
img {
    width: 100%;
    height: auto;
    border-radius: 12px;
}
</style>
</head>
<body>

<div class="grid">
    <img src="card_1.png">
    <img src="card_2.png">
    <img src="card_3.png">
    <img src="card_4.png">
</div>

</body>
</html>
